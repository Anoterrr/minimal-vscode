# Overrides do preset tokyo-night

command_timeout = 800

[character]
success_symbol = "[❯](bold #9ece6a)"
error_symbol   = "[❯](bold #f7768e)"
vimcmd_symbol  = "[❮](bold #bb9af7)"

[java]
format            = "[ $symbol($version)]($style) "
symbol            = " "
style             = "#f7768e"
detect_files      = ["pom.xml", "build.gradle", "build.gradle.kts", ".java-version"]
detect_extensions = ["java", "kotlin", "groovy"]
